<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Services - Chameleon Salon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./service.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </style>
</head>

<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Chameleon Salon</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="service.html">Services</a></li>
          <li class="nav-item">
            <a href="check.html" class="btn btn-outline-dark ms-lg-2 mb-2 mb-lg-0">
              <i class="fa-regular fa-calendar me-2"></i>Check Booking
            </a>
          </li>
          <li class="nav-item">
            <button class="btn btn-primary rounded-pill callbtn ms-lg-2">
              <i class="fa-solid fa-phone me-2"></i>Call Us
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="text-center mb-5">
      <h1 class="display-4 text-center">Choose Your Services</h1>
      <p class="lead text-muted mx-auto" style="max-width: 700px;">
        Select from our range of premium beauty treatments. Each service is performed by our expert team using top-quality products.
      </p>
    </div>

    <div id="output" class="row g-4 mb-5">
      <!-- Services will be populated here -->
    </div>

    <div class="text-center">
      <button id="addbtn" class="btn btn-primary btn-lg rounded-pill px-5 shadow-lg">
        Continue to Booking Details <i class="fa-solid fa-arrow-right ms-2"></i>
      </button>
    </div>
  </div>

  <script>
    const Data = [
      {
        id: 1,
        name: "Professional Makeup",
        details: "Comphair salonlete makeup application for any occasion",
        time: "60 min",
        price: "$150",
        image: "Professional-Makeup-Artist-scaled.webp"
      },
      {
        id: 2,
        name: "Hair Styling",
        details: "Professional hair styling and blowout",
        time: "90 min",
        price: "$120",
        image: "haie.avif"
      },
      {
        id: 3,
        name: "Relaxing Facial",
        details: "Deep cleansing and rejuvenating facial treatment",
        time: "75 min",
        price: "$100",
        image: "Relaxation-Detox-Facial-800.jpg"
      },
      {
        id: 4,
        name: "Manicure & Nail Art",
        details: "Complete nail care with beautiful designs",
        time: "45 min",
        price: "$60",
        image: "istockphoto-1461739328-612x612.jpg"
      },
      {
        id: 5,
        name: "Eyebrow Shaping",
        details: "Professional eyebrow threading and shaping",
        time: "30 min",
        price: "$40",
        image: "images.jpeg"
      },
      {
        id: 6,
        name: "Eyelash Extensions",
        details: "Natural or dramatic lash extensions",
        time: "120 min",
        price: "$200",
        image: "images (1).jpeg"
      },
    ];

    const output = document.getElementById("output");
    const addbtn = document.getElementById("addbtn");

    function renderServices() {
        const stored = localStorage.getItem("selectedservices");
        const selectedIds = stored ? JSON.parse(stored).map(s => s.id) : [];

        output.innerHTML = Data.map((item) => {
            const isActive = selectedIds.includes(item.id) ? 'active' : '';
            return `
                <div class="col-lg-4 col-md-6">
                    <div class="service-card ${isActive}" data-id="${item.id}">
                        <div class="service-img-container mb-3">
                            <img src="${item.image}" alt="${item.name}" class="service-card-img">
                        </div>
                        <div>
                            <h3 class="h4 mb-2">${item.name}</h3>
                            <p class="text-muted small">${item.details}</p>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="text-muted small"><i class="fa-regular fa-clock me-1"></i> ${item.time}</span>
                            <span class="price-tag">${item.price}</span>
                        </div>
                    </div>
                </div>
            `;
        }).join("");

        attachListeners();
    }

    function attachListeners() {
        const cards = document.querySelectorAll(".service-card");
        cards.forEach((card) => {
            card.addEventListener("click", () => {
                card.classList.toggle("active");
            });
        });
    }

    addbtn.addEventListener("click", () => {
        const selectedCards = document.querySelectorAll(".service-card.active");
        const selectedData = Array.from(selectedCards).map(card => {
            const id = Number(card.getAttribute("data-id"));
            return Data.find(d => d.id === id);
        });

        if (selectedData.length === 0) {
            alert("Please select at least one service.");
            return;
        }

        localStorage.setItem("selectedservices", JSON.stringify(selectedData));
        window.location.href = "page2.html";
    });

    renderServices();
  </script>
</body>

</html>
