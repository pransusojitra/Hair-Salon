<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Booking - Chameleon Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./check.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Chameleon Salon</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="service.html">Services</a></li>
                    <li class="nav-item">
                        <a href="check.html" class="btn btn-outline-dark ms-lg-2 mb-2 mb-lg-0 active">
                            <i class="fa-regular fa-calendar me-2"></i>Check Booking
                        </a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-primary rounded-pill callbtn ms-lg-2">
                            <i class="fa-solid fa-phone me-2"></i>Call Us
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="text-center mb-5">
                    <h1 class="display-4">Check Your Bookings</h1>
                    <p class="lead text-muted">Enter your WhatsApp number to view your appointment status.</p>
                </div>

                <div class="card border-0 shadow-sm rounded-4 p-4 mb-5">
                    <div class="mb-3">
                        <label class="form-label fw-bold">WhatsApp Number</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-brands fa-whatsapp text-success"></i></span>
                            <input type="text" id="input" class="form-control border-start-0 rounded-end-3" placeholder="+1 (555) 123-4567">
                        </div>
                    </div>
                    <button id="btn" type="button" class="btn btn-primary btn-lg w-100 rounded-pill shadow mb-3">
                        Find My Appointment <i class="fa-solid fa-magnifying-glass ms-2"></i>
                    </button>
                    <div class="text-center">
                        <a href="index.html" class="back-home-btn small">
                            <i class="fa-solid fa-arrow-left me-1"></i> Back to Home
                        </a>
                    </div>
                </div>

                <div id="output" class="mt-4">
                    <!-- Results will appear here -->
                </div>

                <div class="card border-0 bg-secondary text-white rounded-4 p-4 mt-5">
                    <div class="text-center">
                        <h3 class="h5 mb-3">Need Help?</h3>
                        <p class="small opacity-75">If you have questions about your booking or need to make changes, please contact us directly.</p>
                        <div class="d-flex gap-3 justify-content-center mt-3">
                            <button class="btn btn-light rounded-pill px-4"><i class="fa-solid fa-phone me-2"></i>Call Us</button>
                            <button class="btn btn-outline-light rounded-pill px-4"><i class="fa-solid fa-envelope me-2"></i>Email Support</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById("btn");
        const output = document.getElementById("output");

        btn.addEventListener("click", () => {
            const inputVal = document.getElementById("input").value.trim();
            if (!inputVal) {
                alert("Please enter a WhatsApp number.");
                return;
            }

            // Check bookings array (new format)
            const bookings = JSON.parse(localStorage.getItem("bookings") || "[]");
            // Check single booking (old format fallback)
            const singleBooking = JSON.parse(localStorage.getItem("booking") || "null");

            // Combine for searching
            let allBookings = [...bookings];
            if (singleBooking) allBookings.push(singleBooking);

            // Find the most recent booking for this number
            const userBooking = allBookings
                .filter(b => b.whatsapp === inputVal)
                .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];

            if (userBooking) {
                showBookingDetails(userBooking);
                // Scroll to result
                setTimeout(() => {
                    output.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            } else {
                showNoBooking();
            }
        });

        function showBookingDetails(booking) {
            const servicesHtml = booking.services.map(s => `
                <div class="d-flex justify-content-between small text-muted mb-1">
                    <span>${s.name}</span>
                    <span>${s.price}</span>
                </div>
            `).join("");

            output.innerHTML = `
                <div class="card border-0 shadow rounded-4 overflow-hidden">
                    <div class="bg-success text-white p-3 text-center">
                        <i class="fa-solid fa-circle-check fa-2x mb-2"></i>
                        <h4 class="mb-0">Booking Found!</h4>
                    </div>
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start mb-4">
                            <div>
                                <p class="text-muted small mb-0">Status</p>
                                <span class="badge bg-success-subtle text-success rounded-pill px-3">Confirmed</span>
                            </div>
                            <div class="text-end">
                                <p class="text-muted small mb-0">Reference</p>
                                <span class="fw-mono">#${booking.id || 'N/A'}</span>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-6">
                                <p class="text-muted small mb-0">Date</p>
                                <p class="fw-bold mb-0">${booking.date}</p>
                            </div>
                            <div class="col-6">
                                <p class="text-muted small mb-0">Time</p>
                                <p class="fw-bold mb-0">${booking.time}</p>
                            </div>
                        </div>
                        <div class="bg-light rounded-3 p-3">
                            <p class="fw-bold small mb-2">Services</p>
                            ${servicesHtml}
                        </div>
                        <button onclick="location.href='index.html'" class="btn btn-outline-primary w-100 rounded-pill mt-4">
                            Back to Home
                        </button>
                    </div>
                </div>
            `;
        }

        function showNoBooking() {
            output.innerHTML = `
                <div class="card border-0 shadow-sm rounded-4 p-5 text-center">
                    <div class="service-icon mx-auto mb-4" style="width: 80px; height: 80px; background: #f8f9fa;">
                         <i class="fa-solid fa-calendar-xmark fa-2x text-muted"></i>
                    </div>
                    <h3 class="h4">No Bookings Found</h3>
                    <p class="text-muted">We couldn't find any appointments associated with this WhatsApp number.</p>
                    <div class="d-flex gap-2 justify-content-center mt-3">
                        <button onclick="document.getElementById('input').focus()" class="btn btn-outline-primary rounded-pill px-4">Search Again</button>
                        <a href="service.html" class="btn btn-primary rounded-pill px-4">Book Now</a>
                    </div>
                </div>
            `;
        }
    </script>
</body>

</html>
