<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Details - Chameleon Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./booking.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Chameleon Salon</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="service.html">Services</a></li>
                    <li class="nav-item">
                        <a href="check.html" class="btn btn-outline-dark ms-lg-2 mb-2 mb-lg-0">
                            <i class="fa-regular fa-calendar me-2"></i>Check Booking
                        </a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-primary rounded-pill callbtn ms-lg-2">
                            <i class="fa-solid fa-phone me-2"></i>Call Us
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="text-center mb-5">
                    <h1 class="display-4">Complete Your Booking</h1>
                    <p class="lead text-muted">Please provide your details to finalize the appointment.</p>
                </div>

                <div class="row g-4">
                    <!-- Selected Services Summary -->
                    <div class="col-md-5 order-md-2">
                        <div class="card border-0 shadow-sm rounded-4 mb-4">
                            <div class="card-body p-4">
                                <h2 class="h4 mb-4">Summary</h2>
                                <div id="selected-services-list" class="mb-4">
                                    <!-- Populated by JS -->
                                </div>
                                <hr>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="fw-bold">Total Est. Price</span>
                                    <span id="total-price" class="h4 mb-0 text-primary fw-bold">$0</span>
                                </div>
                            </div>
                        </div>
                        <a href="service.html" class="btn btn-link text-decoration-none text-muted">
                            <i class="fa-solid fa-chevron-left me-2"></i>Edit Services
                        </a>
                    </div>

                    <!-- Booking Form -->
                    <div class="col-md-7 order-md-1">
                        <div class="card border-0 shadow-sm rounded-4 p-4">
                            <h2 class="h4 mb-4">Appointment Details</h2>
                            <form id="booking-form">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-600">Date</label>
                                        <input type="date" id="date" class="form-control rounded-3" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-600">Time</label>
                                        <input type="time" id="Time" class="form-control rounded-3" required>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-600">WhatsApp Number</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fa-brands fa-whatsapp text-success"></i></span>
                                            <input type="text" id="input" class="form-control border-start-0 rounded-end-3" placeholder="+1 (555) 123-4567" required>
                                        </div>
                                        <div class="form-text mt-2">
                                            We'll send booking confirmation and updates via WhatsApp.
                                        </div>
                                    </div>
                                    <div class="col-12 mt-4">
                                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow">
                                            Confirm Booking <i class="fa-solid fa-check ms-2"></i>
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const selectedServicesList = document.getElementById("selected-services-list");
        const totalPriceEl = document.getElementById("total-price");
        const bookingForm = document.getElementById("booking-form");

        function displaySelectedServices() {
            const selectedServices = JSON.parse(localStorage.getItem("selectedservices") || "[]");
            const listContainer = document.getElementById("selected-services-list");
            const totalPriceElement = document.getElementById("total-price");

            if (selectedServices.length === 0) {
                listContainer.innerHTML = '<p class="text-muted">No services selected.</p>';
                return;
            }

            let total = 0;
            listContainer.innerHTML = selectedServices.map(item => {
                const price = parseInt(item.price.replace('$', ''));
                total += price;
                return `
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex align-items-center">
                            <img src="${item.image}" class="cart-item-img me-3" alt="${item.name}">
                            <div>
                                <p class="mb-0 summary-text-main">${item.name}</p>
                                <span class="summary-text-muted small">${item.time}</span>
                            </div>
                        </div>
                        <span class="fw-bold text-primary">${item.price}</span>
                    </div>
                `;
            }).join("");

            totalPriceElement.innerText = `$${total}`;
        }

        bookingForm.addEventListener("submit", (e) => {
            e.preventDefault();

            const date = document.getElementById("date").value;
            const time = document.getElementById("Time").value;
            const whatsapp = document.getElementById("input").value;

            if (selected.length === 0) {
                alert("Please select at least one service.");
                window.location.href = "service.html";
                return;
            }

            const bookingData = {
                services: selected,
                date: date,
                time: time,
                whatsapp: whatsapp,
                status: "confirmed", // Changed to confirmed for demo purposes
                timestamp: new Date().toISOString()
            };

            // Currently overwrites existing booking for this demo
            localStorage.setItem("booking", JSON.stringify(bookingData));
            
            // Clear selection after booking
            localStorage.removeItem("selectedservices");

            alert("Booking Confirmed Successfully!");
            window.location.href = "check.html";
        });

        displaySelectedServices();

        // Set min date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').setAttribute('min', today);
    </script>
</body>

</html>
